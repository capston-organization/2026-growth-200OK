<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <title>Wario Style Game Manager</title>
    <style>
      body {
        margin: 0;
        padding: 0;
        overflow: hidden;
        background-color: white;
      }
    </style>
    <script src="https://cdn.jsdelivr.net/npm/phaser@3.60.0/dist/phaser.min.js"></script>
  </head>
  <body>
    <script>
      class MainScene extends Phaser.Scene {
        constructor() {
          super({ key: "MainScene" });
        }

        create() {
          // --- 1. 변수 초기화 (플로우차트 기반) ---
          this.lives = 3;
          this.score = 0; // 성공한 미니게임 갯수
          this.consecutiveWins = 0; // 연속 성공 횟수
          this.speedLevel = 1; // 1~5 단계
          this.isGameRunning = true;

          // --- 2. UI 요소 배치 (반응형) ---
          const { width, height } = this.scale;
          const centerX = width * 0.5;
          const centerY = height * 0.45; // 박스를 약간 위로

          // 배경 (완전 흰색)
          this.cameras.main.setBackgroundColor("#FFFFFF");

          // (2) 점수판 (왼쪽) - 001 형태
          this.scoreText = this.add
            .text(width * 0.1, centerY, "000", {
              fontSize: "64px",
              color: "#000000",
              fontFamily: "Arial",
              fontStyle: "bold",
            })
            .setOrigin(0.5);

          // (1) 중앙 네모 박스 (게임 화면)
          this.gameBox = this.add.rectangle(
            centerX,
            centerY,
            300,
            300,
            0xffffff,
          );
          this.gameBox.setStrokeStyle(4, 0x000000); // 검은 테두리

          // 게임 상태 텍스트 (박스 안에 표시)
          this.statusText = this.add
            .text(centerX, centerY, "Ready", {
              fontSize: "32px",
              color: "#000",
              fontStyle: "bold",
            })
            .setOrigin(0.5);

          // Speed 레벨 표시 (디버깅용, 우측 상단)
          this.speedText = this.add
            .text(width - 20, 20, "SPEED: 1", {
              fontSize: "24px",
              color: "#000",
            })
            .setOrigin(1, 0);

          // (3) 하트 (Life) - 박스 하단
          this.hearts = [];
          const heartY = centerY + 220;
          const heartGap = 60;

          for (let i = 0; i < 3; i++) {
            // 하트는 간단히 원 2개와 역삼각형으로 그림 (에셋 없이 코드 드로잉)
            let heart = this.add.graphics();
            this.drawHeart(heart, 0xff69b4); // 분홍색
            heart.x = centerX - heartGap + i * heartGap;
            heart.y = heartY;
            this.hearts.push(heart);
          }

          // --- 3. 게임 루프 시작 ---
          // 1초 뒤 첫 게임 시작
          this.time.delayedCall(1000, this.startMiniGame, [], this);

          // 화면 리사이즈 대응
          this.scale.on("resize", this.resize, this);
        }

        // 하트 그리기 헬퍼 함수
        drawHeart(graphics, color) {
          graphics.clear();
          graphics.fillStyle(color, 1);
          // 하트 모양 path
          graphics.beginPath();
          const size = 15;
          graphics.moveTo(0, size);
          graphics.bezierCurveTo(
            size,
            -size / 2,
            size * 2,
            -size / 2,
            0,
            size * 2.5,
          );
          graphics.bezierCurveTo(
            -size * 2,
            -size / 2,
            -size,
            -size / 2,
            0,
            size,
          );
          graphics.fillPath();
        }

        // --- 게임 로직 ---

        startMiniGame() {
          if (!this.isGameRunning) return;

          // 1. 박스 색상 초기화 (흰색)
          this.gameBox.setFillStyle(0xffffff);
          this.statusText.setText("PLAY!");

          // 2. 제한 시간 계산 (속도 레벨에 따라)
          // Lv1: 7초, Lv2: 6초 ... Lv5: 3초
          let timeLimit = (8 - this.speedLevel) * 1000;
          // 최소 3초 보장
          if (timeLimit < 3000) timeLimit = 3000;

          console.log(
            `Game Start! Speed Lv: ${this.speedLevel}, Time: ${timeLimit}ms`,
          );

          // 3. 미니게임 로직 실행 (지금은 시뮬레이션: 클릭하면 성공)
          // *실제 개발 시 여기서 다른 Scene을 실행하거나 로직을 교체합니다*
          this.currentTaskSolved = false;

          // 임시 조작: 박스를 클릭하면 성공으로 간주
          this.gameBox.setInteractive();
          this.gameBox.once("pointerdown", () => {
            this.currentTaskSolved = true;
            this.statusText.setText("Done!");
          });

          // 타이머 시작
          this.timerEvent = this.time.delayedCall(
            timeLimit,
            this.checkResult,
            [],
            this,
          );
        }

        checkResult() {
          this.gameBox.disableInteractive(); // 입력 차단

          // 성공 여부 판단
          if (this.currentTaskSolved) {
            this.handleSuccess();
          } else {
            this.handleFail();
          }
        }

        handleSuccess() {
          // 1. 상태 업데이트
          this.consecutiveWins++;
          if (this.score < 999) this.score++; // 999 유지

          // 2. UI 업데이트
          this.updateScoreUI();
          this.gameBox.setFillStyle(0xffff00); // 노란색
          this.statusText.setText("SUCCESS");

          // 3. 스피드 업 체크 (플로우차트 로직)
          if (this.consecutiveWins >= 5) {
            this.consecutiveWins = 0;
            if (this.speedLevel < 5) {
              this.speedLevel++;
              this.speedText.setText(`SPEED: ${this.speedLevel}`);
              // 스피드업 연출을 원하면 여기에 추가
            }
          }

          // 4. 3초 대기 후 다음 게임
          this.time.delayedCall(3000, this.startMiniGame, [], this);
        }

        handleFail() {
          // 1. 상태 업데이트
          this.lives--;
          this.consecutiveWins = 0; // 연속 성공 초기화

          // 2. UI 업데이트
          this.gameBox.setFillStyle(0x0000ff); // 푸른색
          this.statusText.setText("FAILED");

          // 하트 색상 변경 (왼쪽부터 검은색으로, 즉 lives 인덱스에 해당하는 하트)
          // lives가 2가 되면 index 2(세번째)가 아니라, index 0(첫번째)부터 깎이는지, 오른쪽부터인지?
          // "가장 왼쪽에 있는 분홍색 하트 하나가 검은색이 된다" -> 배열 역순 혹은 순차 처리
          // 현재 남은 하트 갯수만큼은 분홍, 나머지는 검정으로 다시 그리기

          // 로직: lives가 2개 남았다 -> 0,1번 분홍 / 2번 검정 (오른쪽부터 까짐)
          // 만약 "왼쪽부터" 까진다면 로직 반대로. 보통 오른쪽부터 사라지니 오른쪽부터 처리하겠습니다.
          // 스케치상 왼쪽부터 사라지는게 맞다면 아래 로직 수정 가능.
          // -> "가장 왼쪽에 있는 분홍색 하트"라고 하셨으니 왼쪽(Index 0)부터 까겠습니다.

          // 현재 로직: lives=2 -> 하트 3개 중 1개 검정.
          // 시각적으로 3개중 왼쪽(0번)을 검정으로 바꿈.
          // 다음엔 1번을 검정으로...
          const lostHeartIndex = 2 - this.lives; // 3-2=1? 아님.
          // lives: 2 -> 1개 잃음 -> index 0을 블랙으로.
          // lives: 1 -> 2개 잃음 -> index 1을 블랙으로.
          // lives: 0 -> 3개 잃음 -> index 2를 블랙으로.
          const targetIndex = 2 - this.lives; // (3-1=2, 틀림)

          // 정확한 인덱스 계산: (총 개수 - 현재 개수 - 1)
          // 3 - 2 - 1 = 0 (첫번째)
          // 3 - 1 - 1 = 1 (두번째)
          // 3 - 0 - 1 = 2 (세번째)
          const deadHeartIdx = 3 - this.lives - 1;
          if (deadHeartIdx >= 0 && deadHeartIdx < 3) {
            this.drawHeart(this.hearts[deadHeartIdx], 0x000000); // 검은색
          }

          // 3. 게임 오버 체크
          if (this.lives <= 0) {
            this.time.delayedCall(3000, this.gameOver, [], this);
          } else {
            // 4. 3초 대기 후 다음 게임
            this.time.delayedCall(3000, this.startMiniGame, [], this);
          }
        }

        updateScoreUI() {
          // 001, 010, 100 포맷팅
          const scoreStr = String(this.score).padStart(3, "0");
          this.scoreText.setText(scoreStr);
        }

        gameOver() {
          this.isGameRunning = false;
          this.gameBox.setFillStyle(0xffffff);
          this.statusText.setText("GAME OVER");
          this.statusText.setColor("#FF0000");
        }

        resize(gameSize) {
          const width = gameSize.width;
          const height = gameSize.height;

          this.cameras.main.setViewport(0, 0, width, height);

          const centerX = width * 0.5;
          const centerY = height * 0.45;

          // 위치 재조정
          this.scoreText.setPosition(width * 0.1, centerY);
          this.gameBox.setPosition(centerX, centerY);
          this.statusText.setPosition(centerX, centerY);
          this.speedText.setPosition(width - 20, 20);

          const heartY = centerY + 220;
          const heartGap = 60;
          this.hearts.forEach((heart, i) => {
            heart.x = centerX - heartGap + i * heartGap;
            heart.y = heartY;
          });
        }
      }

      const config = {
        type: Phaser.AUTO,
        width: window.innerWidth,
        height: window.innerHeight,
        backgroundColor: "#FFFFFF",
        scale: {
          mode: Phaser.Scale.RESIZE,
          autoCenter: Phaser.Scale.CENTER_BOTH,
        },
        scene: MainScene,
      };

      const game = new Phaser.Game(config);
    </script>
  </body>
</html>
