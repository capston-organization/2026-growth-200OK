<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <title>MainGame2 - 6가지 게임 랜덤</title>
    <style>
      body {
        margin: 0;
        padding: 0;
        overflow: hidden;
        background-color: white;
      }
      @font-face {
        font-family: "Nunito";
        src: url("../../common/Fonts/Nunito/static/Nunito-SemiBold.ttf");
      }
    </style>
    <script src="https://cdn.jsdelivr.net/npm/phaser@3.60.0/dist/phaser.min.js"></script>
    <!-- 기존 3개 미니게임 (MiniGames) -->
    <script src="../../MiniGames/ShortAnswerGames/MiniGame1/MiniShortGame1.js"></script>
    <script src="../../MiniGames/MultiChoiceGames/MiniGame1/MiniMultiGame1.js"></script>
    <script src="../../MiniGames/OXGames/MiniGame1/MiniOXGame1.js"></script>
    <!-- MainGame3의 3개 게임(떡OX, 단답형, 객관식) - 에셋은 MainGame3/assets 참조 -->
    <script>
      window.MAINGAME3_ASSETS_BASE = "../MainGame3/assets/";
    </script>
    <script src="../MainGame3/games/TteokOXGame.js"></script>
    <script src="../MainGame3/games/ShortAnswerGame.js"></script>
    <script src="../MainGame3/games/MultiChoiceGame.js"></script>
  </head>
  <body>
    <div
      style="
        font-family: &quot;Nunito&quot;;
        opacity: 0;
        position: absolute;
        pointer-events: none;
      "
    >
      .
    </div>
    <script>
      class MainScene extends Phaser.Scene {
        constructor() {
          super({ key: "MainScene" });
        }

        create() {
          // --- [A] 게임 상태 변수 초기화 ---
          this.lives = 3;
          this.score = 0;
          this.consecutiveWins = 0;
          this.speedLevel = 1;
          this.isGameRunning = true;

          // ★ 추가: 문제 관리 배열
          this.allProblems = [];
          this.remainingProblems = [];
          this.correctAnswers = [];
          this.wrongAnswers = [];
          this.accessToken = "";
          this.gameId = null;

          const { width, height } = this.scale;
          const centerX = width * 0.5;
          const centerY = height * 0.45;

          this.cameras.main.setBackgroundColor("#FFFFFF");

          this.scoreText = this.add
            .text(width * 0.1, centerY, "000", {
              fontSize: "64px",
              color: "#000000",
              fontFamily: "Arial",
              fontStyle: "bold",
            })
            .setOrigin(0.5);

          this.gameBox = this.add.rectangle(
            centerX,
            centerY,
            300,
            300,
            0xffffff,
          );
          this.gameBox.setStrokeStyle(4, 0x000000);

          this.statusText = this.add
            .text(centerX, centerY, "Ready", {
              fontSize: "32px",
              color: "#000",
              fontStyle: "bold",
            })
            .setOrigin(0.5);

          this.speedText = this.add
            .text(width - 20, 20, "SPEED: 1", {
              fontSize: "24px",
              color: "#000",
            })
            .setOrigin(1, 0);

          this.hearts = [];
          const heartY = centerY + 220;
          for (let i = 0; i < 3; i++) {
            let heart = this.add.graphics();
            heart.x = centerX - 60 + i * 60;
            heart.y = heartY;
            this.drawHeart(heart, 0xff69b4);
            this.hearts.push(heart);
          }

          this.time.delayedCall(2000, this.startMiniGame, [], this);

          // --- [B] React 데이터 수신 리스너 추가 ---
          window.addEventListener("message", (event) => {
            if (event.data && event.data.type === "START_GAME") {
              this.gameId = event.data.gameId;
              this.accessToken = event.data.accessToken;
              this.allProblems = event.data.problems;
              this.remainingProblems = [...this.allProblems];
              // 모든 문제는 처음에 '오답' 상태로 시작
              this.wrongAnswers = [...this.allProblems];

              this.time.delayedCall(2000, this.startMiniGame, [], this);
            }
          });

          this.scale.on("resize", this.resize, this);
        }

        drawHeart(graphics, color) {
          graphics.clear();
          graphics.fillStyle(color, 1);
          graphics.fillCircle(-10, -10, 15);
          graphics.fillCircle(10, -10, 15);
          graphics.fillTriangle(-23, -5, 23, -5, 0, 25);
        }

        startMiniGame() {
          if (!this.isGameRunning) return;
          // ★ 남은 문제가 없으면 게임 클리어
          if (this.remainingProblems.length === 0) {
            this.gameClear();
            return;
          }

          this.statusText.setText("");

          // ★ 남은 문제 중 랜덤 추출
          const randomProblem = Phaser.Utils.Array.GetRandom(
            this.remainingProblems,
          );

          // ★ 해설 생성 API 호출
          this.generateExplanation(randomProblem.id);

          // ★ 문제 타입에 따른 게임 키 결정 (6가지 게임 대응)
          let gameKey = "";
          if (randomProblem.type === "MULTIPLE_CHOICE") {
            // 2개 중 하나 랜덤 (기존 버전 vs 떡 버전 등)
            gameKey = Phaser.Math.RND.pick([
              "MiniMultiGame1",
              "MultiChoiceGame",
            ]);
          } else if (randomProblem.type === "OX") {
            gameKey = Phaser.Math.RND.pick(["MiniOXGame1", "TteokOXGame"]);
          } else if (randomProblem.type === "SHORT_ANSWER") {
            gameKey = Phaser.Math.RND.pick([
              "MiniShortGame1",
              "ShortAnswerGame",
            ]);
          } else {
            // 타입이 없으면 전체 중 랜덤
            const games = [
              "MiniMultiGame1",
              "MiniOXGame1",
              "MiniShortGame1",
              "TteokOXGame",
              "ShortAnswerGame",
              "MultiChoiceGame",
            ];
            gameKey = Phaser.Math.RND.pick(games);
          }

          this.scene.launch(gameKey, {
            speedLevel: this.speedLevel,
            parent: this,
            problem: randomProblem, // ★ 문제 객체 전달
          });
        }

        // 결과 처리 통합
        handleMiniGameResult(isSuccess, problem) {
          // React에 개별 문제 결과 전송
          window.parent.postMessage(
            {
              type: "SUBMIT_PROBLEM_RESULT",
              problemId: problem.id,
              correct: isSuccess,
            },
            "*",
          );

          if (isSuccess) {
            // 정답 배열 추가 및 남은 목록에서 제거
            if (!this.correctAnswers.some((p) => p.id === problem.id)) {
              this.correctAnswers.push(problem);
            }
            this.remainingProblems = this.remainingProblems.filter(
              (p) => p.id !== problem.id,
            );
            this.wrongAnswers = this.wrongAnswers.filter(
              (p) => p.id !== problem.id,
            );
            this.handleSuccess();
          } else {
            this.handleFail();
          }
        }

        // ★ 신규 추가: 게임 클리어 (모든 문제 정답 시)
        gameClear() {
          this.isGameRunning = false;
          this.gameBox.setFillStyle(0xffff00);
          this.statusText.setText("CONGRATULATIONS!");
          this.statusText.setColor("#FF1493");
          this.statusText.setFontSize("48px");

          window.parent.postMessage(
            {
              type: "GAME_CLEAR",
              finalScore: this.score,
              correctAnswers: this.correctAnswers,
              wrongAnswers: this.wrongAnswers,
            },
            "*",
          );
        }

        // ★ 신규 추가: 해설 생성 함수
        async generateExplanation(problemId) {
          if (!this.gameId || !this.accessToken) return;
          const url = `/games/${this.gameId}/problems/${problemId}/explanation`;
          try {
            await fetch(url, {
              method: "GET",
              headers: {
                Authorization: `Bearer ${this.accessToken}`,
                "Content-Type": "application/json",
              },
            });
          } catch (error) {
            console.error("Explanation error:", error);
          }
        }

        handleSuccess() {
          this.consecutiveWins++;
          if (this.score < 999) this.score++;
          this.updateScoreUI();
          this.gameBox.setFillStyle(0xffff00);
          this.statusText.setText("SUCCESS");
          this.statusText.setColor("#000000");
          if (this.consecutiveWins >= 5) {
            this.consecutiveWins = 0;
            if (this.speedLevel < 5) {
              this.speedLevel++;
              this.speedText.setText("SPEED: " + this.speedLevel);
            }
          }
          this.time.delayedCall(5000, this.resetAndNext, [], this);
        }

        handleFail() {
          this.lives--;
          this.consecutiveWins = 0;
          this.gameBox.setFillStyle(0x0000ff);
          this.statusText.setText("FAILED");
          this.statusText.setColor("#FFFFFF");
          const deadHeartIdx = 3 - this.lives - 1;
          if (deadHeartIdx >= 0 && deadHeartIdx < 3) {
            this.drawHeart(this.hearts[deadHeartIdx], 0x000000);
          }
          if (this.lives <= 0) {
            this.time.delayedCall(5000, this.gameOver, [], this);
          } else {
            this.time.delayedCall(5000, this.resetAndNext, [], this);
          }
        }

        resetAndNext() {
          this.gameBox.setFillStyle(0xffffff);
          this.statusText.setText("Ready...");
          this.statusText.setColor("#000000");
          this.time.delayedCall(2000, this.startMiniGame, [], this);
        }

        updateScoreUI() {
          this.scoreText.setText(String(this.score).padStart(3, "0"));
        }

        gameOver() {
          this.isGameRunning = false;
          this.gameBox.setFillStyle(0xffffff);
          this.statusText.setText("GAME OVER");
          this.statusText.setColor("#FF0000");

          window.parent.postMessage(
            {
              type: "GAME_OVER",
              finalScore: this.score,
              correctAnswers: this.correctAnswers,
              wrongAnswers: this.wrongAnswers,
            },
            "*",
          );
        }

        resize(gameSize) {
          const width = gameSize.width;
          const height = gameSize.height;
          this.cameras.main.setViewport(0, 0, width, height);
          const centerX = width * 0.5;
          const centerY = height * 0.45;
          this.scoreText.setPosition(width * 0.1, centerY);
          this.gameBox.setPosition(centerX, centerY);
          this.statusText.setPosition(centerX, centerY);
          this.speedText.setPosition(width - 20, 20);
          const heartY = centerY + 220;
          this.hearts.forEach(function (heart, i) {
            heart.x = centerX - 60 + i * 60;
            heart.y = heartY;
          });
        }
      }

      const config = {
        type: Phaser.AUTO,
        width: window.innerWidth,
        height: window.innerHeight,
        backgroundColor: "#FFFFFF",
        resolution: window.devicePixelRatio,
        scale: {
          mode: Phaser.Scale.RESIZE,
          autoCenter: Phaser.Scale.CENTER_BOTH,
        },
        scene: [
          MainScene,
          MiniMultiGame1,
          MiniOXGame1,
          MiniShortGame1,
          TteokOXGame,
          ShortAnswerGame,
          MultiChoiceGame,
        ],
      };

      const game = new Phaser.Game(config);
    </script>
  </body>
</html>
