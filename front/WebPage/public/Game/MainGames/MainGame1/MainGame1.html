      /**
       * [MainScene 클래스]
       * 게임의 전체적인 흐름을 관리하는 매니저(Manager) 역할입니다.
       * - 점수(Score), 생명(Lives), 스피드(Speed) 상태 관리
       * - 미니게임을 랜덤으로 실행하고, 결과를 받아서 성공/실패 처리
       * - UI(배경/스크린/생명 캐릭터/말롱·마이크, 상태 메시지 등) 표시
       */
      class MainScene extends Phaser.Scene {
        constructor() {
          super({ key: "MainScene" }); // 이 씬의 고유 식별자(Key) 설정
        }

        /** React postMessage(START_GAME) — 중복·테스트 모드와 겹치지 않게 1회만 적용 */
        applyReactStartGame(data) {
          if (!data || data.type !== "START_GAME" || this._reactStartApplied)
            return;
          this._reactStartApplied = true;
          console.log("Phaser: React로부터 데이터 수신 성공!", data);
          this.gameId = data.gameId;
          this.accessToken = data.accessToken || "";
          const list = Array.isArray(data.problems) ? data.problems : [];
          this.allProblems = list;
          this.remainingProblems = [...list];
          this.wrongAnswers = [...list];
          this._scheduleStartMiniGameAfterPrewarm();
        }

        _scheduleStartMiniGameAfterPrewarm() {
          let introReady = false;
          let assetsReady = false;
          const tryStart = () => {
            if (introReady && assetsReady) this.startMiniGame();
          };
          this.time.delayedCall(2000, () => {
            introReady = true;
            tryStart();
          });
          this._ensureMiniGameAssetsPrewarmed(() => {
            assetsReady = true;
            tryStart();
          });
        }

        _flushMiniPrewarmCallbacks() {
          const cbs = this._miniPrewarmCallbacks || [];
          this._miniPrewarmCallbacks = [];
          cbs.forEach((cb) => cb());
        }

        _ensureMiniGameAssetsPrewarmed(onComplete) {
          if (this.registry.get("mainGame1MiniPrewarmDone")) {
            if (onComplete) onComplete();
            return;
          }
          if (onComplete) {
            if (!this._miniPrewarmCallbacks) this._miniPrewarmCallbacks = [];
            this._miniPrewarmCallbacks.push(onComplete);
          }
          if (this._miniPrewarmLoading) return;

          const added = this._queueMiniGamePrewarmLoads();
          if (added === 0) {
            this.registry.set("mainGame1MiniPrewarmDone", true);
            this._flushMiniPrewarmCallbacks();
            return;
          }

          this._miniPrewarmLoading = true;
          this.load.once("complete", () => {
            this._miniPrewarmLoading = false;
            this.registry.set("mainGame1MiniPrewarmDone", true);
            this._flushMiniPrewarmCallbacks();
          });
          if (!this.load.isLoading()) this.load.start();
        }

        _queueMiniGamePrewarmLoads() {
          let n = 0;
          const img = (key, url) => {
            if (!this.textures.exists(key)) {
              this.load.image(key, url);
              n++;
            }
          };
          const aud = (key, url) => {
            if (!this.cache.audio.exists(key)) {

              n++;

          const MG = "../../MiniGames";

          const ox1i = `${MG}/OXGames/MiniGame1/assets/images/`;
          const ox1s = `${MG}/OXGames/MiniGame1/assets/sounds/`;

            ["background1", "Background1.png"],

            ["rightGraphic", "RightGraphicDefault.png"],
            ["lightGraphic", "Light.png"],

            ["redLightGraphic", "RedLight.png"],
            ["rightGraphicSuccess", "RightGraphicSuccess.png"],
            ["rightGraphicFailed", "RightGraphicFailed.png"],

            ["target1Shot", "Target1Shot.png"],

            ["물떡", "images/물떡.png"],
            ["망치기본토끼", "images/망치기본토끼.png"],
            ["망치망치토끼", "images/망치망치토끼.png"],
            ["물기본토끼", "images/물기본토끼.png"],
            ["물물토끼", "images/물물토끼.png"],
          ].forEach(([k, f]) => img(k, tteok + f));
          aud("backgroundMusic", tteok + "sounds/떡게임배경소리.mp3");
          aud("hey", tteok + "sounds/hey.mp3");
          aud("one", tteok + "sounds/one.mp3");
          aud("two", tteok + "sounds/two.mp3");

          return n;
        }

          this.load.image("main_screen", base + "Screen.png");

        /**
         * 1. create(): 게임이 처음 시작될 때 한 번 실행되는 함수
         * 변수 초기화 및 화면의 UI 요소들을 배치합니다.
         */
        create() {
          // --- [A] 게임 상태 변수 초기화 ---
          this.lives = 3; // 생명 (하트 3개)
          this.score = 0; // 현재 점수
          this.consecutiveWins = 0; // 연속 성공 횟수 (5번 성공 시 스피드 업)
          this.speedLevel = 1; // 게임 속도 레벨 (1~5단계)
          this.isGameRunning = true; // 게임 진행 중 여부 (Game Over 체크용)

          // ★ 추가: 전체 문제 배열과 남은 문제 배열
          this.allProblems = [];
          this.remainingProblems = [];

          // ★ [추가] 정답과 오답을 추적할 배열 추가
          this.correctAnswers = [];
          this.wrongAnswers = [];

          this.accessToken = ""; // 토큰 저장용
          this.gameId = null; // 게임 세션 ID 저장용

          this.mallongAltTimer = null;
          this.lifeBounceTweens = [];

          // --- [B] UI (Example.png 기준 비율 배치) ---
          this.cameras.main.setBackgroundColor("#000000");

          const DEPTH = {
            BG: 0,
            BOX: 10,
            SCREEN: 20,
            OVERLAY: 30,
            LIVES: 40,
            MALLONG: 50,
            MIKE: 60,
            STATUS: 70,
            SPEED: 80,
            GAME_BOX: 5,
          };

          this.imgBg = this.add.image(0, 0, "main_bg2").setDepth(DEPTH.BG);
          this.imgBox = this.add.image(0, 0, "main_box").setDepth(DEPTH.BOX);
          this.imgScreen = this.add
            .image(0, 0, "main_screen")
            .setDepth(DEPTH.SCREEN);
          this.imgFailOverlay = this.add
            .image(0, 0, "main_fail_overlay")
            .setDepth(DEPTH.OVERLAY)
            .setVisible(false);
          this.imgSuccessOverlay = this.add
            .image(0, 0, "main_success_overlay")
            .setDepth(DEPTH.OVERLAY)
            .setVisible(false);

          this.lifeSprites = [
            this.add.image(0, 0, "life_c1").setDepth(DEPTH.LIVES),
            this.add.image(0, 0, "life_c2").setDepth(DEPTH.LIVES),
            this.add.image(0, 0, "life_c3").setDepth(DEPTH.LIVES),
          ];

          this.mallongImg = this.add
            .image(0, 0, "mallong_ready")
            .setDepth(DEPTH.MALLONG);
          this.mikeImg = this.add.image(0, 0, "main_mike").setDepth(DEPTH.MIKE);

          this.statusText = this.add
            .text(0, 0, "Ready", {
              fontSize: "32px",
              color: "#ffffff",
              fontStyle: "bold",
              fontFamily: "Arial",
              stroke: "#000000",
              strokeThickness: 4,
            })
            .setDepth(DEPTH.STATUS)
            .setOrigin(0.5);

          this.speedText = this.add
            .text(0, 0, "SPEED: 1", {
              fontSize: "24px",
              color: "#ffffff",
              fontFamily: "Arial",
              stroke: "#000000",
              strokeThickness: 3,
            })
            .setDepth(DEPTH.SPEED)
            .setOrigin(1, 0);

          this.gameBox = this.add.rectangle(0, 0, 300, 300, 0xffffff, 0);
          this.gameBox.setStrokeStyle(0, 0x000000, 0);
          this.gameBox.setDepth(DEPTH.GAME_BOX);
          this.gameBox.setVisible(false);

          this.layoutMainStage();
          this.setScreenOverlays(false, false);
          this.stopMallongAlternate();
          this.startLifeBounce();
          this.startMainStageBgmFadeIn();

          // iframe 자동재생 정책: 부모에서 클릭해도 iframe AudioContext는 잠긴 경우가 많음 → 첫 클릭에 resume
          this.input.once("pointerdown", () => {
            const ctx = this.sound.context;
            if (ctx && ctx.state === "suspended") {
              ctx
                .resume()
                .then(() => this.startMainStageBgmFadeIn())
                .catch(() => {});
            }
          });

          this._ensureMiniGameAssetsPrewarmed(() => {});

          // --- [C] React에서 데이터 받아서 게임 루프 시작 (늦게 도착한 메시지 + load 레이스로 먼저 온 메시지) ---
          window.addEventListener("message", (event) => {
            this.applyReactStartGame(event.data);
          });
          if (window.__MAIN_GAME1_PENDING_START__) {
            this.applyReactStartGame(window.__MAIN_GAME1_PENDING_START__);
            window.__MAIN_GAME1_PENDING_START__ = null;
          }

          // --- [D] 로컬 테스트: MainGame1.html?test=1 로 열면 샘플 문제로 실행 ---
          const params = new URLSearchParams(window.location.search);
          if (params.get("test") === "1") {
            console.log(
              "[MainGame1 테스트 모드] 샘플 문제로 0.6초 후 시작합니다. (?test=1)",
            );
            this.time.delayedCall(300, () => {
              this.gameId = null;
              this.accessToken = "";
              this.allProblems = window.__MAIN_GAME1_DEMO_PROBLEMS__;
              this.remainingProblems = [...this.allProblems];
              this.wrongAnswers = [...this.allProblems];
              this._ensureMiniGameAssetsPrewarmed(() => {
                this.time.delayedCall(300, this.startMiniGame, [], this);
              });
            });
          }

          this.scale.on("resize", this.resize, this);
        }

        _killMainBgmTween() {
          if (this._mainBgmFadeTween) {
            this._mainBgmFadeTween.stop();
            this._mainBgmFadeTween = null;
          }
        }

        /**
         * 메인 무대 BGM 페이드 아웃 후 정지. duration 0이면 즉시.
         * @param {number} duration ms
         * @param {function} [onComplete]
         */
        stopMainStageBgmFadeOut(duration = 600, onComplete) {
          this._killMainBgmTween();
          if (!this._mainBgmSound) {
            if (onComplete) onComplete();
            return;
          }
          if (duration <= 0) {
            try {
              this._mainBgmSound.stop();
            } catch (e) {
              /* ignore */
            }
            this._mainBgmSound = null;
            if (onComplete) onComplete();
            return;
          }
          this._mainBgmFadeTween = this.tweens.add({
            targets: this._mainBgmSound,
            volume: 0,
            duration,
            ease: "Sine.easeOut",
            onComplete: () => {
              try {
                if (this._mainBgmSound) this._mainBgmSound.stop();
              } catch (e) {
                /* ignore */
              }
              this._mainBgmSound = null;
              this._mainBgmFadeTween = null;
              if (onComplete) onComplete();
            },
          });
        }

        /** Ready / 라운드 사이: BGM 페이드 인 (루프). Success·Failed·종료 구간에서는 호출하지 않음. */
        startMainStageBgmFadeIn() {
          if (!this.cache.audio.exists("mainStageBgm")) return;
          if (!this.isGameRunning) return;
          this.stopMainStageBgmFadeOut(0);
          try {
            this._mainBgmSound = this.sound.add("mainStageBgm", {
              loop: true,
              volume: 0,
            });
          } catch (e) {
            console.warn("MainGame1 BGM add 실패:", e);
            return;
          }
          const targetVol = 0.42;
          const fadeMs = 2000;
          const runFade = () => {
            if (
              !this._mainBgmSound ||
              !this.scene.isActive() ||
              !this.isGameRunning
            )
              return;
            try {
              if (!this._mainBgmSound.isPlaying) this._mainBgmSound.play();
            } catch (e) {
              console.warn("MainGame1 BGM play:", e);
            }
            this._killMainBgmTween();
            this._mainBgmFadeTween = this.tweens.add({
              targets: this._mainBgmSound,
              volume: targetVol,
              duration: fadeMs,
              ease: "Sine.easeIn",
            });
          };
          const ctx = this.sound.context;
          if (ctx && ctx.state === "suspended") {
            ctx.resume().then(runFade).catch(runFade);
          } else {
            runFade();
          }
        }

        playMainSfx(key) {
          if (!this.cache.audio.exists(key)) return;
          try {
            this.sound.play(key, { volume: 1 });
          } catch (e) {
            console.warn("MainGame1 SFX:", key, e);
          }
        }

        layoutMainStage() {
          const w = this.scale.width;
          const h = this.scale.height;
          const cx = w * 0.5;
          const cy = h * 0.5;
          const L = MAIN_GAME1_LAYOUT;

          const coverScale = (texKey, img) => {
            const t = this.textures.get(texKey).getSourceImage();
            const iw = t.width;
            const ih = t.height;
            const s = Math.max(w / iw, h / ih);
            img.setPosition(cx, cy).setScale(s).setOrigin(0.5);
          };

          coverScale("main_bg2", this.imgBg);

          const boxTex = this.textures.get("main_box").getSourceImage();
          const boxMaxW = w * L.boxMaxWidthRatio;
          const boxMaxH = h * L.boxMaxHeightRatio;
          const boxScale = Math.min(
            boxMaxW / boxTex.width,
            boxMaxH / boxTex.height,
          );
          const boxX = w * L.boxCenterXRatio;
          const boxY = h * L.boxCenterYRatio;
          this.imgBox.setPosition(boxX, boxY).setScale(boxScale).setOrigin(0.5);

          const scr = this.textures.get("main_screen").getSourceImage();
          const sw = scr.width;
          const screenTargetW = w * L.screenWidthRatio;
          const screenScale = screenTargetW / sw;
          const screenX = w * L.screenGroupCenterXRatio;
          const screenY = h * L.screenGroupCenterYRatio;
          this.imgScreen
            .setPosition(screenX, screenY)
            .setScale(screenScale)
            .setOrigin(0.5);
          this.imgFailOverlay
            .setPosition(screenX, screenY)
            .setScale(screenScale)
            .setOrigin(0.5);
          this.imgSuccessOverlay
            .setPosition(screenX, screenY)
            .setScale(screenScale)
            .setOrigin(0.5);

          this.statusText.setPosition(screenX, screenY);
          this.statusText.setStyle({ fontSize: `${Math.round(w * 0.028)}px` });

          const lifeY = h * L.lifeBottomYRatio;
          const lifeSpan = w * L.lifeSpanRatio;
          const lifeBaseX = w * L.lifeFirstCenterXRatio;
          this.lifeBaseScale =
            (w * L.lifeWidthRatio) /
            this.textures.get("life_c1").getSourceImage().width;
          for (let i = 0; i < 3; i++) {
            const s = this.lifeSprites[i];
            s.setPosition(lifeBaseX + i * lifeSpan, lifeY)
              .setScale(this.lifeBaseScale)
              .setOrigin(0.5, 1);
          }

          const m = this.textures.get("mallong_ready").getSourceImage();
          const mallongScale = (w * L.mallongWidthRatio) / m.width;
          const mallongX = w * L.mallongCenterXRatio;
          const mallongY = h * L.mallongBottomYRatio;
          this.mallongImg
            .setPosition(mallongX, mallongY)
            .setScale(mallongScale)
            .setOrigin(0.5, 1);

          const mikeTex = this.textures.get("main_mike").getSourceImage();
          const mikeScale = (w * L.mikeWidthRatio) / mikeTex.width;
          this.mikeImg
            .setPosition(w * L.mikeCenterXRatio, h * L.mikeCenterYRatio)
            .setScale(mikeScale)
            .setOrigin(0.5, 0.85);

          this.speedText.setPosition(w - 16, 16);

          this.gameBox.setPosition(cx, cy);
        }

        setScreenOverlays(showSuccess, showFail) {
          this.imgSuccessOverlay.setVisible(!!showSuccess);
          this.imgFailOverlay.setVisible(!!showFail);
        }

        stopMallongAlternate() {
          if (this.mallongAltTimer) {
            this.mallongAltTimer.remove();
            this.mallongAltTimer = null;
          }
        }

        startMallongAlternate(texA, texB) {
          this.stopMallongAlternate();
          let useA = true;
          this.mallongImg.setTexture(useA ? texA : texB);
          this.mallongAltTimer = this.time.addEvent({
            delay: 800,
            loop: true,
            callback: () => {
              useA = !useA;
              this.mallongImg.setTexture(useA ? texA : texB);
            },
          });
        }

        stopLifeBounce() {
          this.lifeBounceTweens.forEach((t) => t && t.stop && t.stop());
          this.lifeBounceTweens = [];
        }

        startLifeBounce() {
          this.stopLifeBounce();
          const bs =
            this.lifeBaseScale ||
            (this.scale.width * 0.12) /
              this.textures.get("life_c1").getSourceImage().width;
          // Character1: 가장 자주 / Character2: 중간 / Character3: 가끔 (얌전한 스케일)
          const bobByIndex = [
            { duration: 320, scaleMul: 1.038 },
            { duration: 520, scaleMul: 1.032 },
            { duration: 820, scaleMul: 1.028 },
          ];
          this.lifeSprites.forEach((s, i) => {
            if (!s.visible) return;
            s.setScale(bs);
            const { duration, scaleMul } = bobByIndex[i] || bobByIndex[1];
            const tw = this.tweens.add({
              targets: s,
              scaleX: bs * scaleMul,
              scaleY: bs * scaleMul,
              duration,
              yoyo: true,
              repeat: -1,
              ease: "Sine.easeInOut",
            });
            this.lifeBounceTweens.push(tw);
          });
        }

        /**
         * 2. startMiniGame(): 미니게임을 실제로 실행하는 핵심 함수
         * - 대기 상태 텍스트를 지우고, 랜덤한 게임을 골라 실행합니다.
         */
        startMiniGame() {
          if (!this.isGameRunning) return; // 게임 오버 상태면 실행 안 함

          // ★ 추가: 남은 문제가 없으면 게임 클리어 (Congratulation)
          if (this.remainingProblems.length === 0) {
            this.gameClear();
            return;
          }

          const doLaunch = () => {
            this.statusText.setText("");
            this.setScreenOverlays(false, false);
            this.stopMallongAlternate();
            this.mallongImg.setVisible(false);
            this.mikeImg.setVisible(false);

            const randomProblem = Phaser.Utils.Array.GetRandom(
              this.remainingProblems,
            );

            this.generateExplanation(randomProblem.id);

            const normalizeType = (rawType) => {
              const t = String(rawType || "")
                .toUpperCase()
                .replace(/[\s-]/g, "_");
              if (t === "MULTIPLE_CHOICE" || t === "MULTIPLECHOICE")
                return "MULTIPLE_CHOICE";
              if (t === "SHORT_ANSWER" || t === "SHORTANSWER")
                return "SHORT_ANSWER";
              if (t === "OX" || t === "TRUE_FALSE") return "OX";
              return "";
            };

            const sceneByType = {
              MULTIPLE_CHOICE: ["MultiChoiceGame", "MiniMultiGame1"],
              OX: ["TteokOXGame", "MiniOXGame1"],
              SHORT_ANSWER: ["ShortAnswerGame", "MiniShortGame1"],
            };

            const normalizedType = normalizeType(randomProblem.type);
            let gameKey = "";

            if (normalizedType && sceneByType[normalizedType]) {
              gameKey = Phaser.Math.RND.pick(sceneByType[normalizedType]);
            } else {
              const typeSet = new Set();
              this.remainingProblems.forEach((p) => {
                const nt = normalizeType(p && p.type);
                if (nt) typeSet.add(nt);
              });

              const fallbackScenes = [];
              typeSet.forEach((t) => {
                fallbackScenes.push(...sceneByType[t]);
              });

              if (fallbackScenes.length > 0) {
                gameKey = Phaser.Math.RND.pick(fallbackScenes);
              } else {
                gameKey = Phaser.Math.RND.pick([
                  "ShortAnswerGame",
                  "MiniShortGame1",
                ]);
              }
            }

            this.scene.launch(gameKey, {
              speedLevel: this.speedLevel,
              parent: this,
              problem: randomProblem,
            });

            console.log(`Launched: ${gameKey}, Speed: ${this.speedLevel}`);
          };

          this.stopMainStageBgmFadeOut(450, doLaunch);
        }

        /**
         * 3. handleMiniGameResult(): 미니게임 결과 처리 함수
         * - 미니게임(MiniGame1.js 등)에서 게임이 끝나면 이 함수를 호출합니다.
         * @param {boolean} isSuccess - 성공(true) / 실패(false)
         */
        handleMiniGameResult(isSuccess, problem) {
          // ★ 추가: React로 해당 문제의 정답 여부 전송 (React에서 POST API 호출하도록)
          window.parent.postMessage(
            {
              type: "SUBMIT_PROBLEM_RESULT",
              problemId: problem.id,
              correct: isSuccess,
            },
            "*",
          );

          if (isSuccess) {
            // [추가] 정답 배열에 중복 없이 추가
            if (!this.correctAnswers.some((p) => p.id === problem.id)) {
              this.correctAnswers.push(problem);
            }
            // 남은 문제 배열에서 제거 (이제 문제로 안 나옴)
            this.remainingProblems = this.remainingProblems.filter(
              (p) => p.id !== problem.id,
            );
            // ★ 성공한 문제는 '오답(기본 상태)' 배열에서 완전히 빼냅니다.
            this.wrongAnswers = this.wrongAnswers.filter(
              (p) => p.id !== problem.id,
            );

            this.handleSuccess();
          } else {
            // ★ 이미 모든 문제가 처음부터 wrongAnswers에 들어있으므로,
            // 실패했을 때는 배열을 건드릴 필요 없이 상태 처리만 하면 됩니다.
            this.handleFail();
          }
        }

        // ★ 추가: 모든 문제를 다 맞췄을 때 호출되는 함수
        gameClear() {
          this.isGameRunning = false;
          this.stopMainStageBgmFadeOut(0);
          this.stopMallongAlternate();
          this.setScreenOverlays(false, false);
          this.mallongImg.setVisible(true);
          this.mikeImg.setVisible(true);
          this.mallongImg.setTexture("mallong_congrats");
          this.statusText.setText("Congratulation");
          this.statusText.setColor("#ffffff");
          this.playMainSfx("sfxCongratulation");

          // ★ 정답/오답 배열도 같이 React로 전송
          window.parent.postMessage(
            {
              type: "GAME_CLEAR",
              finalScore: this.score,
              correctAnswers: this.correctAnswers,
              wrongAnswers: this.wrongAnswers,
            },
            "*",
          );
        }

        /**
         * 4. handleSuccess(): 성공했을 때의 로직
         */
        handleSuccess() {
          this.consecutiveWins++; // 연속 성공 횟수 증가
          if (this.score < 999) this.score++; // 점수 1점 증가 (최대 999)

          this.updateScoreUI();

          this.stopMainStageBgmFadeOut(0);
          this.playMainSfx("sfxSuccess");

          this.statusText.setText("");
          this.setScreenOverlays(true, false);
          this.mallongImg.setVisible(true);
          this.mikeImg.setVisible(true);
          this.startMallongAlternate("mallong_s1", "mallong_s2");

          // [스피드 업 체크] 5번 연속 성공하면 레벨 업
          if (this.consecutiveWins >= 5) {
            this.consecutiveWins = 0; // 카운트 초기화
            if (this.speedLevel < 5) {
              this.speedLevel++; // 속도 레벨 증가
              this.speedText.setText(`SPEED: ${this.speedLevel}`); // UI 갱신
            }
          }

          // 5초 대기 후: 남은 문제 없으면 Ready 없이 바로 클리어, 있으면 다음 라운드 준비
          const afterSuccess =
            this.remainingProblems.length === 0
              ? this.gameClear
              : this.resetAndNext;
          this.time.delayedCall(5000, afterSuccess, [], this);
        }

        /**
         * 5. handleFail(): 실패했을 때의 로직
         */
        handleFail() {
          this.lives--; // 생명 1 감소
          this.consecutiveWins = 0; // 연속 성공 기록 초기화

          this.stopMainStageBgmFadeOut(0);
          this.playMainSfx("sfxFailed");

          this.statusText.setText("");
          this.setScreenOverlays(false, true);
          this.mallongImg.setVisible(true);
          this.mikeImg.setVisible(true);
          this.startMallongAlternate("mallong_f1", "mallong_f2");

          // 왼쪽부터 제거: Character1 → Character2 → Character3 (this.lives는 이미 1 감소된 값)
          const deadHeartIdx = 3 - this.lives - 1;
          if (deadHeartIdx >= 0 && deadHeartIdx < 3) {
            this.stopLifeBounce();
            this.lifeSprites[deadHeartIdx].setVisible(false);
            this.startLifeBounce();
          }

          // 생명이 0 이하면 Game Over, 아니면 다음 판 진행
          if (this.lives <= 0) {
            this.time.delayedCall(5000, this.gameOver, [], this);
          } else {
            this.time.delayedCall(5000, this.resetAndNext, [], this);
          }
        }

        /**
         * 6. resetAndNext(): 다음 판을 위해 화면을 정리하는 함수
         */
        resetAndNext() {
          this.setScreenOverlays(false, false);
          this.stopMallongAlternate();
          this.statusText.setText("Ready");
          this.statusText.setColor("#ffffff");
          this.mallongImg.setVisible(true);
          this.mikeImg.setVisible(true);
          this.mallongImg.setTexture("mallong_ready");
          this.startMainStageBgmFadeIn();

          // 2초 대기 후 다시 미니게임 랜덤 실행
          this.time.delayedCall(2000, this.startMiniGame, [], this);
        }

        /**
         * [UI 업데이트] 점수 텍스트는 제거됨 — 내부 score만 유지
         */
        updateScoreUI() {}

        /**
         * [추가] 해설 단 건 조회/생성 API 호출 (비동기)
         * 화면에 보여줄 필요가 없으므로 호출 후 응답을 기다리지 않고 게임을 계속 진행합니다.
         */
        async generateExplanation(problemId) {
          if (!this.gameId || !this.accessToken) return;

          const url = `/games/${this.gameId}/problems/${problemId}/explanation`;

          try {
            // 결과를 보여줄 필요가 없으므로 fetch만 실행하고 넘아갑니다.
            await fetch(url, {
              method: "GET",
              headers: {
                Authorization: `Bearer ${this.accessToken}`,
                "Content-Type": "application/json",
              },
            });
            console.log(`Explanation request sent for problem: ${problemId}`);
          } catch (error) {
            // 게임 진행에 지장을 주면 안 되므로 에러는 콘솔에만 출력합니다.
            console.error("Failed to generate explanation:", error);
          }
        }

        /**
         * 7. gameOver(): 게임 오버 처리
         */
        gameOver() {
          this.isGameRunning = false;
          this.stopMainStageBgmFadeOut(0);
          this.stopMallongAlternate();
          this.setScreenOverlays(false, false);
          this.mallongImg.setVisible(true);
          this.mikeImg.setVisible(true);
          this.mallongImg.setTexture("mallong_gameover");
          this.statusText.setText("Game Over");
          this.statusText.setColor("#ffffff");
          this.playMainSfx("sfxGameOver");

          // ★ [수정] 정답/오답 배열도 같이 React로 전송
          window.parent.postMessage(
            {
              type: "GAME_OVER",
              finalScore: this.score,
              correctAnswers: this.correctAnswers,
              wrongAnswers: this.wrongAnswers,
            },
            "*",
          );
        }

        /**
         * [반응형 처리] 브라우저 크기가 바뀌면 UI 위치를 다시 잡아주는 함수
         */
        resize(gameSize) {
          const width = gameSize.width;
          const height = gameSize.height;
          this.cameras.main.setViewport(0, 0, width, height);
          this.layoutMainStage();
          this.stopLifeBounce();
          this.startLifeBounce();
        }
      }

      // --- [Phaser 게임 설정 객체] ---
      const config = {
        type: Phaser.AUTO, // 웹브라우저 환경에 맞춰 렌더러 자동 선택 (WebGL or Canvas)
        width: window.innerWidth,
        height: window.innerHeight,
        backgroundColor: "#FFFFFF",
        resolution: window.devicePixelRatio,
        scale: {
          mode: Phaser.Scale.RESIZE, // 창 크기에 맞춰 게임 크기 자동 조절
          autoCenter: Phaser.Scale.CENTER_BOTH,
        },
        // ★ [중요] 게임에 사용할 모든 Scene을 여기에 등록해야 합니다 ★
        // MainScene이 배열의 0번이므로 가장 먼저 실행됩니다.
        // 기존 Mini* 게임들도 남겨두고, MainGame3용 3개 게임을 추가로 등록합니다.
        scene: [
          MainScene,
          MiniMultiGame1,
          MiniOXGame1,
          MiniShortGame1,
          MultiChoiceGame,
          ShortAnswerGame,
          TteokOXGame,
        ],
      };

      // 게임 인스턴스 생성 (여기서 게임이 시작됩니다)
      const game = new Phaser.Game(config);
    </script>
  </body>
