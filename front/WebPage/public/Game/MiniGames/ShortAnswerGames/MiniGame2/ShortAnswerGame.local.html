<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <title>ShortAnswerGame — 로컬 테스트</title>
    <!--
      cd WebPage && npm run dev
      → http://localhost:5173/Game/MiniGames/ShortAnswerGames/MiniGame2/ShortAnswerGame.local.html

      a / an 입력(소문자 기준 비교). ?q=0 · ?speed=1~5 · ?loop=0
    -->
    <style>
      body {
        margin: 0;
        padding: 0;
        overflow: hidden;
        background: #1a0a2e;
        font-family: system-ui, sans-serif;
      }
      #hud {
        position: fixed;
        top: 8px;
        left: 12px;
        z-index: 9999;
        color: #f5e8ff;
        font-size: 13px;
        line-height: 1.45;
        pointer-events: none;
        text-shadow: 0 1px 4px #000;
        max-width: 92vw;
      }
      #hud strong {
        color: #c4b5fd;
      }
    </style>
    <script src="https://cdn.jsdelivr.net/npm/phaser@3.60.0/dist/phaser.min.js"></script>
    <script src="ShortAnswerGame.js"></script>
  </head>
  <body>
    <div id="hud" aria-live="polite">
      <div><strong>ShortAnswerGame</strong> 로컬 테스트</div>
      <div id="hud-status">로딩 중…</div>
    </div>

    <script>
      (function () {
        const hudStatus = document.getElementById("hud-status");
        const params = new URLSearchParams(window.location.search);
        const problems = window.SHORT_ANSWER_GAME_MOCK_PROBLEMS || [];
        const loop = params.get("loop") !== "0";
        const speedLevel = Math.min(
          5,
          Math.max(1, parseInt(params.get("speed") || "1", 10) || 1),
        );
        const SCENE_KEY = "ShortAnswerGame";

        function pickProblem() {
          const q = params.get("q");
          if (q !== null && q !== "") {
            const idx =
              ((parseInt(q, 10) || 0) % problems.length + problems.length) %
              problems.length;
            return problems[idx];
          }
          return Phaser.Utils.Array.GetRandom(problems);
        }

        class ShortAnswerStandaloneBoot extends Phaser.Scene {
          constructor() {
            super({ key: "ShortAnswerStandaloneBoot" });
          }
          create() {
            this.launchRound();
          }
          handleMiniGameResult(isSuccess, problem) {
            const label = isSuccess ? "SUCCESS" : "FAILED";
            hudStatus.textContent = `${label} — id ${problem.id}: ${problem.question}`;
            console.log("[ShortAnswerGame local]", label, problem);
            if (!loop) return;
            this.time.delayedCall(2500, () => {
              if (this.scene.isActive(SCENE_KEY)) this.scene.stop(SCENE_KEY);
              this.launchRound();
            });
          }
          launchRound() {
            const problem = pickProblem();
            hudStatus.textContent = `문제 #${problem.id} (speed ${speedLevel}) — 입력 후 Enter`;
            if (this.scene.isActive(SCENE_KEY)) this.scene.stop(SCENE_KEY);
            this.scene.launch(SCENE_KEY, {
              parent: this,
              problem,
              speedLevel,
              assetBase: "./",
            });
          }
        }

        const game = new Phaser.Game({
          type: Phaser.AUTO,
          width: window.innerWidth,
          height: window.innerHeight,
          backgroundColor: "#1a0a2e",
          resolution: window.devicePixelRatio,
          scale: {
            mode: Phaser.Scale.RESIZE,
            autoCenter: Phaser.Scale.CENTER_BOTH,
          },
          scene: [ShortAnswerStandaloneBoot, ShortAnswerGame],
        });
      })();
    </script>
  </body>
</html>
