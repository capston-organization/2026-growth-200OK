spring:
  application:
    name: aim
  datasource:
    url: jdbc:postgresql://localhost:5432/capston
    username: ${DB_NAME}
    password: ${DB_PASSWORD}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
  servlet:
    multipart:
      enabled: true
      max-file-size: 10MB
      max-request-size: 10MB

# FastAPI 서버 URL
fastapi:
  url: http://localhost:8000

logging:
  level:
    org.springframework.security: TRACE
    org.springframework.web: DEBUG