spring:
  datasource:
    url: jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;MODE=PostgreSQL
    driver-class-name: org.h2.Driver
    username: sa
    password:
  jpa:
    hibernate:
      ddl-auto: create-drop
    properties:
      hibernate:
        dialect: org.hibernate.dialect.H2Dialect
    show-sql: false
  main:
    allow-bean-definition-overriding: true
  autoconfigure:
    exclude:
      - org.springframework.boot.autoconfigure.data.redis.RedisAutoConfiguration
      - org.springframework.boot.autoconfigure.data.redis.RedisRepositoriesAutoConfiguration

jwt:
  secret: test-secret-key-for-junit-tests-must-be-long-enough

oauth:
  google:
    token-uri: http://localhost/dummy
    user-info-uri: http://localhost/dummy
    redirect-uri: http://localhost/dummy
    client-id: dummy
    client-secret: dummy

gemini:
  api-key: dummy-test-key
  model: gemini-2.5-flash
  generate-content-url: https://generativelanguage.googleapis.com/v1beta/models

nlp:
  server-url: http://localhost:8000
  timeout-seconds: 60
  enabled: false

app:
  frontend-base-url: http://localhost:5173
